<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASPICE 추적성 시각화 — CLI Calculator (soorak-sam)</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --border: #2e3250;
      --text: #e2e4f0;
      --text-dim: #8890b0;
      --accent: #4f8ef7;

      --col-goal:   #6c3483;
      --col-req:    #1a5276;
      --col-comp:   #117a65;
      --col-unit:   #1e8449;
      --col-tc:     #784212;
      --col-itc:    #7b241c;
      --col-qtc:    #6e2f8a;

      --col-goal-l:   #a569bd;
      --col-req-l:    #5dade2;
      --col-comp-l:   #48c9b0;
      --col-unit-l:   #52be80;
      --col-tc-l:     #f0a500;
      --col-itc-l:    #ec7063;
      --col-qtc-l:    #af7ac5;

      --pass: #2ecc71;
      --fail: #e74c3c;
      --open: #e67e22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header span { font-size: 12px; color: var(--text-dim); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; }

    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      gap: 4px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; padding: 24px; height: calc(100vh - 110px); overflow: auto; }
    .tab-panel.active { display: block; }

    /* ─── 범례 ─── */
    .legend {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px; font-size: 12px;
    }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 3px;
    }

    /* ─── TAB 1: 문서 연결도 ─── */
    #doc-map-svg { width: 100%; min-height: 520px; }

    .doc-node rect {
      rx: 6; ry: 6;
      stroke-width: 1.5;
      cursor: pointer;
      transition: filter .15s;
    }
    .doc-node:hover rect { filter: brightness(1.3); }
    .doc-node text { font-size: 11px; fill: var(--text); pointer-events: none; }
    .doc-arrow { fill: none; stroke: #4a5280; stroke-width: 1.5; marker-end: url(#arrowhead); opacity: .7; }
    .doc-arrow.highlight { stroke: var(--accent); opacity: 1; stroke-width: 2.5; }

    /* ─── TAB 2: 추적성 매트릭스 ─── */
    .matrix-wrap { overflow: auto; }
    table.matrix {
      border-collapse: collapse;
      font-size: 12px;
      white-space: nowrap;
    }
    table.matrix th, table.matrix td {
      border: 1px solid var(--border);
      padding: 5px 8px;
      text-align: center;
    }
    table.matrix th {
      background: var(--bg3);
      color: var(--text-dim);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    table.matrix th.req-header {
      position: sticky;
      left: 0;
      z-index: 3;
    }
    table.matrix td.req-id {
      background: var(--bg2);
      font-weight: 600;
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 1;
      color: var(--col-req-l);
      min-width: 130px;
    }
    .cell-check {
      color: var(--pass);
      font-size: 14px;
    }
    .cell-empty { color: var(--border); }

    .col-group-tc   { background: rgba(240,165,0,.08); }
    .col-group-itc  { background: rgba(236,112,99,.08); }
    .col-group-qtc  { background: rgba(175,122,197,.08); }

    .group-header-tc  { background: rgba(240,165,0,.2) !important; color: var(--col-tc-l) !important; }
    .group-header-itc { background: rgba(236,112,99,.2) !important; color: var(--col-itc-l) !important; }
    .group-header-qtc { background: rgba(175,122,197,.2) !important; color: var(--col-qtc-l) !important; }

    .row-highlight td { background: rgba(79,142,247,.12) !important; }

    /* ─── TAB 3: ID 계층도 ─── */
    #hierarchy-wrap {
      overflow-x: auto;
      overflow-y: auto;
    }
    #hierarchy-svg { display: block; }

    .h-node {
      cursor: pointer;
    }
    .h-node rect {
      rx: 4; ry: 4;
      stroke-width: 1;
      transition: filter .15s;
    }
    .h-node:hover rect { filter: brightness(1.4); }
    .h-node text {
      font-size: 9.5px;
      fill: var(--text);
      pointer-events: none;
      dominant-baseline: middle;
      text-anchor: middle;
    }
    .h-link {
      fill: none;
      stroke-width: 1;
      opacity: .25;
      transition: opacity .15s, stroke-width .15s;
    }
    .h-link.highlight {
      opacity: .9;
      stroke-width: 2.5;
    }
    .h-link.dimmed { opacity: .05; }

    /* ─── 정보 패널 ─── */
    .info-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      min-width: 260px;
      max-width: 380px;
      font-size: 13px;
      display: none;
      z-index: 100;
    }
    .info-panel.visible { display: block; }
    .info-panel h3 { color: var(--accent); margin-bottom: 8px; font-size: 14px; }
    .info-panel p   { color: var(--text-dim); font-size: 12px; line-height: 1.6; }
    .info-panel .close-btn {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 16px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      margin: 1px;
      font-weight: 600;
    }
    .badge-pass { background: rgba(46,204,113,.2); color: var(--pass); }
    .badge-open { background: rgba(230,126,34,.2); color: var(--open); }

    /* column headers for tab1 */
    .col-header text { font-size: 13px; font-weight: 600; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>ASPICE 추적성 시각화</h1>
  <span>CLI Calculator — soorak-sam</span>

  <span style="margin-left:auto; color: var(--pass)">&#10003; 전체 추적성 완결</span>

<nav class="tabs">

  <button class="tab-btn" onclick="switchTab('matrix')">② 추적성 매트릭스</button>
  <button class="tab-btn" onclick="switchTab('hierarchy')">③ ID 계층 추적도</button>

<!-- ════════════════════════════════════════════════

  </p>
  <div id="hierarchy-wrap">
    <svg id="hierarchy-svg"></svg>
  </div>
</div>

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');

(function buildDocMap() {
  const svg = document.getElementById('doc-map-svg');
  const NS = 'http://www.w3.org/2000/svg';
  const W = 160, H = 50;

  // draw edges first (behind nodes)
  const edgesG = document.createElementNS(NS,'g');
  edgesG.id = 'doc-edges';
  svg.appendChild(edgesG);

  const nodesG = document.createElementNS(NS,'g');
  svg.appendChild(nodesG);

  // index
  const docMap = {};
  DOCUMENTS.forEach(d => docMap[d.id] = d);

  DOC_EDGES.forEach(([src,tgt]) => {
    const s = docMap[src], t = docMap[tgt];
    if (!s || !t) return;
    const sx = s.x + W, sy = s.y + H/2;
    const tx = t.x,      ty = t.y + H/2;
    const mx = (sx+tx)/2;
    const path = document.createElementNS(NS,'path');
    path.setAttribute('d',`M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`);
    path.setAttribute('class','doc-arrow');
    path.dataset.src = src;
    path.dataset.tgt = tgt;
    edgesG.appendChild(path);
  });

  DOCUMENTS.forEach(doc => {
    const g = document.createElementNS(NS,'g');
    g.setAttribute('class','doc-node');
    g.setAttribute('transform',`translate(${doc.x},${doc.y})`);
    g.dataset.id = doc.id;

    const rect = document.createElementNS(NS,'rect');
    rect.setAttribute('width', W);
    rect.setAttribute('height', H);
    rect.setAttribute('fill', doc.col + '33');
    rect.setAttribute('stroke', doc.col);
    rect.setAttribute('rx','6');
    g.appendChild(rect);

    const lines = doc.label.split('\n');
    lines.forEach((line, i) => {
      const t = document.createElementNS(NS,'text');
      t.setAttribute('x', W/2);
      t.setAttribute('y', i===0 ? 18 : 35);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size', i===0 ? '11' : '10');
      t.setAttribute('fill', i===0 ? '#e2e4f0' : '#8890b0');
      t.textContent = line;
      g.appendChild(t);
    });

    g.addEventListener('click', () => {
      const edges = document.querySelectorAll('.doc-arrow');
      edges.forEach(e=>{
        e.setAttribute('class','doc-arrow');
        e.setAttribute('marker-end','url(#arrowhead)');
      });
      edges.forEach(e=>{
        if(e.dataset.src===doc.id || e.dataset.tgt===doc.id){
          e.setAttribute('class','doc-arrow highlight');
          e.setAttribute('marker-end','url(#arrowhead-hi)');
        }
      });
      showInfo(doc.id, `프로세스: <b>${doc.proc}</b><br>파일: <code>${doc.file}</code>`);
    });

    nodesG.appendChild(g);
  });

  // section labels
  const labels = [
    {x:180,y:540,text:'SWE-1',col:'#5dade2'},
    {x:380,y:540,text:'SWE-2',col:'#48c9b0'},
    {x:540,y:540,text:'SWE-3',col:'#52be80'},
    {x:700,y:540,text:'SWE-4',col:'#f0a500'},
    {x:860,y:540,text:'SWE-5',col:'#ec7063'},
    {x:1020,y:540,text:'SWE-6',col:'#af7ac5'},
  ];
  labels.forEach(l=>{
    const line = document.createElementNS(NS,'line');
    line.setAttribute('x1',l.x); line.setAttribute('y1',480);
    line.setAttribute('x2',l.x); line.setAttribute('y2',530);
    line.setAttribute('stroke',l.col); line.setAttribute('stroke-width','1');
    line.setAttribute('stroke-dasharray','4,3'); line.setAttribute('opacity','.5');
    svg.appendChild(line);
    const t = document.createElementNS(NS,'text');
    t.setAttribute('x',l.x+80); t.setAttribute('y',540);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','13'); t.setAttribute('fill',l.col);
    t.setAttribute('font-weight','600');
    t.textContent = l.text;
    svg.appendChild(t);
  });
})();

/* ─── 계층도 하이라이트 ─── */
let selectedId = null;

function getConnected(id, layerKey) {
  const connected = new Set([id]);

  /* go backward: find what points TO this id */
  function backward(nodeId, lKey) {
    if (lKey==='req') {
      Object.entries(GOAL_REQ).forEach(([g,rs])=>{ if(rs.includes(nodeId)) { connected.add(g); backward(g,'goal'); } });
    }
    if (lKey==='comp') {
      Object.entries(REQ_COMP).forEach(([r,cs])=>{ if(cs.includes(nodeId)) { connected.add(r); backward(r,'req'); } });
    }
    if (lKey==='unit') {
      Object.entries(COMP_UNIT).forEach(([c,us])=>{ if(us.includes(nodeId)) { connected.add(c); backward(c,'comp'); } });
    }
    if (lKey==='tc') {
      Object.entries(REQ_TC).forEach(([r,ts])=>{ if(ts.includes(nodeId)) { connected.add(r); backward(r,'req'); } });
    }
    if (lKey==='itc') {
      Object.entries(REQ_ITC).forEach(([r,ts])=>{ if(ts.includes(nodeId)) { connected.add(r); backward(r,'req'); } });
    }
    if (lKey==='qtc') {
      Object.entries(REQ_QTC).forEach(([r,ts])=>{ if(ts.includes(nodeId)) { connected.add(r); backward(r,'req'); } });
    }
  }

  /* go forward: find what this id points TO */
  function forward(nodeId, lKey) {
    if (lKey==='goal') {
      (GOAL_REQ[nodeId]||[]).forEach(r=>{ connected.add(r); forward(r,'req'); });
    }
    if (lKey==='req') {
      (REQ_COMP[nodeId]||[]).forEach(c=>{ connected.add(c); forward(c,'comp'); });
      (REQ_TC[nodeId]||[]).forEach(t=>{ connected.add(t); forward(t,'tc'); });
      (REQ_ITC[nodeId]||[]).forEach(t=>{ connected.add(t); forward(t,'itc'); });
      (REQ_QTC[nodeId]||[]).forEach(t=>{ connected.add(t); forward(t,'qtc'); });
    }
    if (lKey==='comp') {
      (COMP_UNIT[nodeId]||[]).forEach(u=>{ connected.add(u); forward(u,'unit'); });
    }
  }

  backward(id, layerKey);
  forward(id, layerKey);
  return connected;
}

function highlightChain(id, layerKey) {
  selectedId = id;
  const connected = getConnected(id, layerKey);

  document.querySelectorAll('.h-link').forEach(l=>{
    const s = l.dataset.src, t = l.dataset.tgt;
    if (connected.has(s) && connected.has(t)) {
      l.classList.remove('dimmed'); l.classList.add('highlight');
    } else {
      l.classList.add('dimmed'); l.classList.remove('highlight');
    }
  });

  document.querySelectorAll('.h-node').forEach(n=>{
    n.querySelector('rect').style.filter = connected.has(n.dataset.id) ? 'brightness(2)' : 'brightness(0.5)';
  });
}

function clearHighlight() {
  selectedId = null;
  document.querySelectorAll('.h-link').forEach(l=>{
    l.classList.remove('dimmed','highlight');
  });
  document.querySelectorAll('.h-node rect').forEach(r=>{ r.style.filter=''; });
}
</script>
</body>
